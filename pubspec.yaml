name: rooverse
description: "ROOVERSE - A decentralized social network."
publish_to: "none"


version: 1.0.1+27

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^14.6.2

  # HTTP requests
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.2.2

  # JSON serialization
  json_annotation: ^4.8.1

  # UI enhancements
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3

  # Localization
  flutter_localizations:
    sdk: flutter

  # Image picker and cropper
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  permission_handler: ^11.3.0
  geolocator: ^10.1.0
  geocoding: ^3.0.0

  # Media editing
  image: ^3.3.0

  photofilters: ^3.0.0
  # Environment variables
  flutter_dotenv: ^5.2.1

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Supabase
  supabase_flutter: ^2.5.0
  video_compress: ^3.1.3
  video_thumbnail: ^0.5.3
  video_player: ^2.10.1
  chewie: ^1.13.0
  file_picker: ^10.3.8
  record: ^6.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  just_audio: ^0.10.5
  swipe_to: ^1.0.6
  emoji_picker_flutter: ^4.3.0
  share_plus: ^10.0.0
  receive_sharing_intent: ^1.8.1

  connectivity_plus: ^6.1.1
  google_fonts: ^6.2.1

  # KYC Verification (Didit)
  url_launcher: ^6.2.5
  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.3
  flutter_local_notifications: ^17.2.2
  qr_flutter: ^4.1.0
  in_app_update: ^4.2.3
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0

  # Code generation for JSON
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.11.0


flutter:
  generate: true

  uses-material-design: true

  assets:
    - .env
    - assets/icon.png
    - assets/splash_icon.png
    - assets/logo_light.png
    - assets/logo_dark.png
    - assets/auth_logo_light.png
    - assets/auth_logo_dark.png


flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#1E1E21"
  adaptive_icon_foreground: "assets/icon.png"
